      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1fbf8"/>
    </linearGradient>
    <linearGradient id="mark-accent" x1="14" y1="45" x2="50" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f766e"/>
