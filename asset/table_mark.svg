<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">USTC Table Mining mark</title>
  <desc id="desc">Square mark with a table grid, connected cells, and TM initials.</desc>
  <defs>
