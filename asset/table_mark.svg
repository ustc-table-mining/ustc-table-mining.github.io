  <circle cx="47" cy="20" r="3.5" fill="#ffffff" stroke="#e88a1a" stroke-width="2.3"/>
  <text x="13" y="56" fill="#0f766e" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="800" letter-spacing="0">TM</text>
