  </defs>
  <rect x="4" y="4" width="56" height="56" rx="12" fill="url(#mark-bg)" stroke="#0f766e" stroke-width="3"/>
  <path d="M17 17H47M17 28H47M17 39H47M17 17V43M27 17V43M37 17V43M47 17V43" fill="none" stroke="#202020" stroke-width="2.6" stroke-linecap="round"/>
